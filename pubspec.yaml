name: final_petbreed_ai
description: A Flutter app that detects and classifies pet breeds (cats, dogs, birds, etc.) using AI and Firebase integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  curved_navigation_bar: ^1.0.6

  # AI & Image Processing
  image_picker: ^1.0.7
  tflite_flutter: ^0.12.1
  image: ^4.1.7

  # UI & Design
  fl_chart: ^0.68.0
  table_calendar: ^3.0.9
  google_fonts: ^6.1.0

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.0
  firebase_analytics: ^10.8.0
  google_sign_in: ^6.2.1


  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  http: ^1.6.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  supabase_flutter: ^2.5.6

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/model_unquant.tflite
    - assets/labels.txt
    - assets/pet.png
